{% extends "base.html" %}

{% block title %}Console - Supervaizer Admin{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <!-- Header -->
    <div class="md:flex md:items-center md:justify-between">
        <div class="min-w-0 flex-1">
            <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:truncate sm:text-3xl sm:tracking-tight">
                Console
            </h2>
            <p class="mt-1 text-sm text-gray-500">Interactive command interface and system logs</p>
        </div>
        <div class="mt-4 flex md:mt-0 space-x-3">
            <button 
                onclick="clearConsole()"
                class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50"
            >
                Clear
            </button>
            <button 
                onclick="toggleAutoScroll()"
                id="autoscroll-btn"
                class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700"
            >
                Auto-scroll: ON
            </button>
        </div>
    </div>

    <!-- Console Interface -->
    <div class="mt-6 space-y-6">
        <!-- Command Input -->
        <div class="bg-white shadow rounded-lg">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Command Interface</h3>
            </div>
            <div class="px-6 py-4">
                <div class="flex space-x-4">
                    <input 
                        type="text" 
                        id="command-input" 
                        placeholder="Enter command..." 
                        class="flex-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm font-mono"
                        onkeypress="handleCommandKeypress(event)"
                    >
                    <button 
                        onclick="executeCommand()"
                        class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700"
                    >
                        Execute
                    </button>
                </div>
            </div>
        </div>

        <!-- Console Output -->
        <div class="bg-white shadow rounded-lg">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Console Output</h3>
            </div>
            <div class="px-6 py-4">
                <div 
                    id="console-output" 
                    class="bg-gray-900 rounded-lg p-4 font-mono text-sm text-green-300 h-96 overflow-y-auto"
                >
                    <div id="console-lines" class="space-y-1">
                        <div class="flex space-x-2">
                            <span class="text-gray-500">[--:--:--]</span>
                            <span class="text-blue-400 font-semibold">SYSTEM</span>
                            <span>Console initialized. Type 'help' for available commands.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let autoScroll = true;
    let lineCount = 1;

    function handleCommandKeypress(event) {
        if (event.key === 'Enter') {
            executeCommand();
        }
    }

    function executeCommand() {
        const input = document.getElementById('command-input');
        const command = input.value.trim();
        
        if (!command) return;
        
        // Show command in console
        addConsoleOutput('USER', `$ ${command}`, 'cyan');
        
        // Process command
        processCommand(command);
        
        // Clear input
        input.value = '';
    }

    function processCommand(command) {
        const cmd = command.toLowerCase();
        
        switch (cmd) {
            case 'help':
                addConsoleOutput('HELP', 'Available commands: status, help, clear', 'yellow');
                break;
            case 'status':
                addConsoleOutput('INFO', 'System Status: Online', 'blue');
                break;
            case 'clear':
                clearConsole();
                return;
            default:
                addConsoleOutput('ERROR', `Unknown command: ${command}`, 'red');
        }
    }

    function addConsoleOutput(level, message, color = 'green') {
        const lines = document.getElementById('console-lines');
        const time = new Date().toLocaleTimeString();
        
        const colorMap = {
            'red': 'text-red-400',
            'green': 'text-green-300',
            'blue': 'text-blue-400',
            'yellow': 'text-yellow-400',
            'cyan': 'text-cyan-400'
        };
        
        const div = document.createElement('div');
        div.className = 'flex space-x-2';
        div.innerHTML = `
            <span class="text-gray-500">[${time}]</span>
            <span class="font-semibold min-w-[60px] ${colorMap[color] || 'text-green-300'}">${level}</span>
            <span class="${colorMap[color] || 'text-green-300'}">${message}</span>
        `;
        
        lines.appendChild(div);
        
        if (autoScroll) {
            const output = document.getElementById('console-output');
            output.scrollTop = output.scrollHeight;
        }
    }

    function clearConsole() {
        document.getElementById('console-lines').innerHTML = '';
        addConsoleOutput('SYSTEM', 'Console cleared.', 'blue');
    }

    function toggleAutoScroll() {
        autoScroll = !autoScroll;
        const btn = document.getElementById('autoscroll-btn');
        btn.textContent = autoScroll ? 'Auto-scroll: ON' : 'Auto-scroll: OFF';
    }
</script>
{% endblock %}
